repos:
- repo: https://github.com/fastai/nbdev
  rev: 2.2.10
  hooks:
  - id: nbdev_export
- repo: local
  hooks:
  - id: forbid-a-acr
    name: "Forbid ' a \\acr' in .tex files. Use 'an \\acr' instead."
    entry: "grep -l ' a \\acr'"
    language: pygrep
    types: [tex]
    args: [--multiline]
    verbose: true
  - id: check-missing-refs
    name: "Check for missing references/citations in thesis.log"
    entry: bash -c 'if [ -f thesis.log ]; then if grep -qE "Reference .* undefined|Citation .* undefined" thesis.log; then echo "Missing references or citations found in thesis.log:"; grep -E "Reference .* undefined|Citation .* undefined" thesis.log; exit 1; fi; fi'
    language: system
    types: [tex]
    pass_filenames: false

